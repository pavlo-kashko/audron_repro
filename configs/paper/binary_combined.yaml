# Binary (drone vs noise) on DroneAudioDataset + DADS (combined).
# Use with data/processed/binary_combined/ manifests (run prepare_dads then prepare_combined_binary).
# Both datasets: 16 kHz, mono; label 0 = noise, 1 = drone.
seed: 42

data:
  sample_rate: 16000
  clip_duration_sec: 3.0
  pad_mode: repeat
  normalize_audio: true
  augmentation:
    train: true
    gaussian_noise:
      enabled: true
      snr_db: [10, 30]
    gain:
      enabled: true
      range: [0.7, 1.3]
    background_noise:
      enabled: false
    time_mask:
      enabled: true
      max_ratio: 0.15
      prob: 0.3
    time_stretch:
      enabled: true
      rate: [0.9, 1.1]
      prob: 0.3

model:
  enabled_branches: [mfcc, stft, rnn, autoencoder]
  frontend:
    n_fft: 1024
    hop_length: 256
    win_length: 1024
    n_mels: 64
    n_mfcc: 13
    fmin: 0.0
    fmax: 8000.0
  mfcc_dim: 128
  stft_dim: 256
  rnn_hidden: 128
  rnn_dim: 192
  autoencoder_dims: [2048, 1024, 512, 160]
  autoencoder_dropout: 0.2

train:
  epochs: 50
  batch_size: 16
  lr: 0.001
  weight_decay: 0.0001
  lr_factor: 0.5
  scheduler_patience: 5
  early_stopping_patience: 10
  reconstruction_weight: 0.1
  class_weights: balanced
  num_workers: 0
  torch_num_threads: 1

task:
  name: binary_combined
  num_classes: 2
  class_names: [noise, drone]
